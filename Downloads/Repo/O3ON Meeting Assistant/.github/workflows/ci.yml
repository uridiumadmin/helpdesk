name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  api-lint-and-test:
    name: API — Lint, Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx jest --passWithNoTests --ci

  mobile-typecheck:
    name: Mobile — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: npx tsc --noEmit
      - run: npx expo export --platform web
        env:
          CI: true

  worker-test:
    name: Worker — Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/audio-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short
