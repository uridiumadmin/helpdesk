version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: o3on_meetings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      S3_BUCKET: o3on-meeting-assistant
    volumes:
      - ./init-minio.sh:/init-minio.sh:ro
    entrypoint: /init-minio.sh

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/o3on_meetings
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-central-1
      S3_BUCKET: o3on-meeting-assistant
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WORKER_BASE_URL: http://worker:8080
      WORKER_AUTO_PROCESS: "true"
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-change-me-before-connecting-api-and-worker}
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_AUTH_SECRET: ${DEV_AUTH_SECRET:-change-me-for-development}
      DEV_AUTH_PASSWORD: ${DEV_AUTH_PASSWORD:-meeting-assistant}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:19006}
      MEETING_STORAGE_ROOT: /data
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - api-data:/data

  worker:
    build:
      context: ../services/audio-worker
      dockerfile: Dockerfile
    ports:
      - "${WORKER_PORT:-8080}:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-change-me-before-connecting-api-and-worker}
      WORKER_ENVIRONMENT: ${WORKER_ENVIRONMENT:-docker}
    volumes:
      - worker-data:/data

volumes:
  postgres-data:
  minio-data:
  api-data:
  worker-data:
